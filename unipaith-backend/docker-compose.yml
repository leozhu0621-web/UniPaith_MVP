services:
  db:
    image: pgvector/pgvector:pg16
    # Tuned for parallel test DDL: each pytest-xdist worker rebuilds the whole
    # schema per test (DROP CASCADE + create_all); concurrent workers otherwise
    # exhaust the default lock table ("out of shared memory").
    command: postgres -c max_locks_per_transaction=512 -c max_connections=200
    shm_size: "512m"
    environment:
      POSTGRES_DB: unipaith
      POSTGRES_USER: unipaith
      POSTGRES_PASSWORD: unipaith
      # Dev-only: allow host-side pytest/asyncpg from Docker Desktop (Mac).
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unipaith"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
