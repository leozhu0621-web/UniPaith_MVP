services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: unipaith
      POSTGRES_USER: unipaith
      POSTGRES_PASSWORD: unipaith
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unipaith"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
