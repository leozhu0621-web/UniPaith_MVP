name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Serialize frontend deploys so concurrent S3 syncs/CloudFront invalidations don't
# race. cancel-in-progress is false (not true): let an in-flight upload finish
# rather than risk a partial bundle; the newest queued run then ships the latest.
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: unipaith-frontend

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.unipaith.co/api/v1
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --delete \
            --cache-control "max-age=31536000,public,immutable" \
            --exclude "index.html" \
            --exclude "*.json"
          # index.html and manifests: no cache (always fresh)
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
          # Upload JSON files (manifests, etc.) with no-cache
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "*" \
            --include "*.json"

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?contains(@,'app.unipaith.co')]].Id" --output text)
          # Only index.html needs busting: every other asset is content-hashed and
          # uploaded "immutable", and the JSON manifests are already served no-cache.
          # Invalidating "/*" re-fetched the whole tree on every deploy (slower, and
          # billable past 1k paths/mo) for zero benefit.
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/index.html"
          echo "CloudFront cache invalidated!"
