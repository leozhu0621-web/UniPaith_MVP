name: Terraform Plan

# PR-time sanity checks for Terraform changes. Runs offline — no AWS auth.
# The full plan-with-AWS-state runs as part of `terraform-apply.yml` on main.
# (Avoids a chicken-and-egg with OIDC trust during initial bootstrap.)

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.9.5'

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt (check)
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init (offline — no backend)
        id: init
        run: terraform init -backend=false -no-color

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Comment results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fmtOk = '${{ steps.fmt.outcome }}' === 'success';
            const initOk = '${{ steps.init.outcome }}' === 'success';
            const validateOk = '${{ steps.validate.outcome }}' === 'success';
            const body = `## Terraform Validate
            | step | status |
            |---|---|
            | fmt | ${fmtOk ? '✅' : '⚠️ run \`terraform fmt -recursive\` locally'} |
            | init | ${initOk ? '✅' : '❌'} |
            | validate | ${validateOk ? '✅' : '❌'} |

            *Real plan-with-state runs on merge inside \`terraform-apply.yml\`.*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if validation failed
        if: steps.init.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: exit 1
