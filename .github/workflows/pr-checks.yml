name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'unipaith-backend/**'
              - '.github/workflows/pr-checks.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/pr-checks.yml'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: unipaith
          POSTGRES_PASSWORD: unipaith
          POSTGRES_DB: unipaith
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: unipaith-backend
        run: pip install -e ".[dev]"
      - name: Enable pgvector
        run: PGPASSWORD=unipaith psql -h localhost -U unipaith -d unipaith -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Lint (ruff)
        working-directory: unipaith-backend
        run: ruff check src tests
      - name: Tests
        working-directory: unipaith-backend
        env:
          DATABASE_URL: postgresql+asyncpg://unipaith:unipaith@localhost:5432/unipaith
          COGNITO_BYPASS: "true"
          AI_MOCK_MODE: "true"
          S3_LOCAL_MODE: "true"
        run: PYTHONPATH=src pytest tests/ -v --tb=short

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck + Build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.unipaith.co/api/v1
        run: npm run build
      - name: Tests
        working-directory: frontend
        run: npx vitest run
