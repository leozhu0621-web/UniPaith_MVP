name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'unipaith-backend/**'
              - '.github/workflows/pr-checks.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/pr-checks.yml'
            ai:
              - 'unipaith-backend/src/unipaith/ai/**'
              - '.github/workflows/pr-checks.yml'

  # Spec 54 §12 — repo hygiene. Always runs (cheap, no deps): rejects the
  # iCloud-style duplicate filenames ("foo 2.ts") that have repeatedly slipped
  # into working trees and produced dual Alembic heads / phantom imports.
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No iCloud-duplicate filenames
        run: |
          strays=$(git ls-files | grep -E ' [0-9]+\.[A-Za-z0-9]+$' || true)
          if [ -n "$strays" ]; then
            echo "$strays"
            echo "::error::iCloud-style duplicate filenames detected (e.g. 'foo 2.ts'). Delete them; never import."
            exit 1
          fi
          echo "Tree is clean of '* N.<ext>' duplicates."

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Start Postgres (pgvector, tuned for parallel test DDL)
        run: |
          docker run -d --name postgres --shm-size=512m \
            -e POSTGRES_USER=unipaith -e POSTGRES_PASSWORD=unipaith -e POSTGRES_DB=unipaith \
            -p 5432:5432 pgvector/pgvector:pg16 \
            -c max_locks_per_transaction=512 -c max_connections=200
          for i in $(seq 1 30); do docker exec postgres pg_isready -U unipaith && break; sleep 1; done
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: unipaith-backend/pyproject.toml
      - name: Install dependencies
        working-directory: unipaith-backend
        run: pip install -e ".[dev]"
      - name: Enable pgvector
        run: PGPASSWORD=unipaith psql -h localhost -U unipaith -d unipaith -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Lint (ruff)
        working-directory: unipaith-backend
        run: ruff check src tests
      - name: Tests
        working-directory: unipaith-backend
        env:
          DATABASE_URL: postgresql+asyncpg://unipaith:unipaith@localhost:5432/unipaith
          COGNITO_BYPASS: "true"
          AI_MOCK_MODE: "true"
          S3_LOCAL_MODE: "true"
        run: PYTHONPATH=src pytest tests/ -n auto --dist loadscope --tb=short

  ai-evals:
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: unipaith-backend/pyproject.toml
      - name: Install dependencies
        working-directory: unipaith-backend
        run: pip install -e ".[dev]"
      - name: Run eval harness (mock mode)
        working-directory: unipaith-backend
        env:
          AI_MOCK_MODE: "true"
        # Mock mode = no Anthropic key required, zero cost. Verifies the
        # harness loads fixtures and exits 0. Real-mode evals run on a
        # nightly schedule in a separate workflow with a budget cap.
        run: PYTHONPATH=src python -m unipaith.ai.evals.runner

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Guard — no apiClient/fetch in pages (Spec 54 §12/§13)
        working-directory: frontend
        run: |
          # A screen reads data only through a typed api/<domain>.ts module.
          if grep -rn "apiClient\." src/pages; then
            echo "::error::apiClient. used inside src/pages — call a typed api/ module instead."
            exit 1
          fi
          # Raw fetch( bypasses the api layer. \bfetch\( does not match refetch/prefetch.
          raw=$(grep -rnE "\bfetch\(" src/pages || true)
          if [ -n "$raw" ]; then
            echo "$raw"
            echo "::error::raw fetch( in src/pages — move it to an api/ module (see api/uploads.ts)."
            exit 1
          fi
          echo "pages/ talk only through the api layer."
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Voice (UX-QA copy guardrail — docs/UX-QA.md)
        working-directory: frontend
        run: npm run voice-lint
      - name: Typecheck + Build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.unipaith.co/api/v1
        run: npm run build
      - name: Upload built frontend for Lighthouse
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
      - name: Tests
        working-directory: frontend
        run: npx vitest run

  # Spec 54 §8 — Core Web Vitals budgets via Lighthouse-CI. Soft-fail first
  # (continue-on-error): it reports but never blocks, until the budgets soak on
  # staging and we flip lighthouserc.json assertions from 'warn' to 'error'.
  lighthouse:
    needs: [changes, frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Download built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Lighthouse CI (soft)
        working-directory: frontend
        continue-on-error: true
        run: npx --yes @lhci/cli autorun
