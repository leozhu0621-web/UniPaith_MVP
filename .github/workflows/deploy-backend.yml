name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'unipaith-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# Only one backend deploy at a time; a newer push cancels the in-progress/queued
# one. Each deploy runs `alembic upgrade heads` (all pending migrations) and ships
# the latest image, so a newer deploy is a strict superset — cancelling stacked
# intermediate deploys is safe and avoids the ~20-min-each pile-up when several
# PRs merge in quick succession.
concurrency:
  group: deploy-backend
  # Serialize, never cancel: a backend deploy runs DB migrations, so cancelling an
  # in-progress deploy means its migration never applies. Under rapid auto-merges
  # this starved every deploy (migrations never landed). Queue them instead — each
  # merged migration deploys; redundant queued runs are cheap (idempotent).
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: unipaith-backend
  ECS_CLUSTER: unipaith-cluster
  ECS_SERVICE: unipaith-backend

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: unipaith
          POSTGRES_PASSWORD: unipaith
          POSTGRES_DB: unipaith
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: unipaith-backend
        run: |
          pip install -e ".[dev]"
      - name: Enable pgvector extension
        run: |
          PGPASSWORD=unipaith psql -h localhost -U unipaith -d unipaith -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run tests
        working-directory: unipaith-backend
        env:
          DATABASE_URL: postgresql+asyncpg://unipaith:unipaith@localhost:5432/unipaith
          COGNITO_BYPASS: "true"
          AI_MOCK_MODE: "true"
          S3_LOCAL_MODE: "true"
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        working-directory: unipaith-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          # Capture digest from docker push output (no ECR DescribeImages perm needed).
          # docker push prints: "<tag>: digest: sha256:<hex> size: <n>"
          DIGEST=$(docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG | tee /dev/stderr | grep -oE 'sha256:[a-f0-9]{64}' | head -1)
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to capture image digest from docker push"
            exit 1
          fi
          echo "Image digest: $DIGEST"
          echo "DIGEST=$DIGEST" >> $GITHUB_OUTPUT

      - name: Register new task definition with pinned digest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DIGEST: ${{ steps.build.outputs.DIGEST }}
        run: |
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY@$DIGEST"
          echo "Pinning to $NEW_IMAGE"

          # Pull current task def, swap image, strip read-only fields, register new revision
          aws ecs describe-task-definition --task-definition $ECS_SERVICE \
            --query 'taskDefinition' > /tmp/td.json

          python3 -c "
          import json
          td = json.load(open('/tmp/td.json'))
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy']:
              td.pop(k, None)
          td['containerDefinitions'][0]['image'] = '$NEW_IMAGE'
          json.dump(td, open('/tmp/td-new.json','w'))
          "

          NEW_TD=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $NEW_TD"
          echo "NEW_TD=$NEW_TD" >> $GITHUB_ENV

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $NEW_TD \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for deployment
        run: |
          # The default AWS CLI services-stable waiter stops after ~10 minutes.
          # ECS can legitimately need slightly longer when the first replacement
          # task misses ALB health checks and the second task stabilizes. Poll
          # explicitly so successful-but-slow deployments do not false-fail.
          deadline=$((SECONDS + 1800))
          attempt=1

          while (( SECONDS < deadline )); do
            read -r DEPLOYMENTS ROLLOUT_STATE DESIRED RUNNING PENDING < <(
              aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$ECS_SERVICE" \
                --region "$AWS_REGION" \
                --query 'services[0].[length(deployments),deployments[?status==`PRIMARY`]|[0].rolloutState,desiredCount,runningCount,pendingCount]' \
                --output text
            )

            echo "ECS wait attempt ${attempt}: deployments=${DEPLOYMENTS} primary=${ROLLOUT_STATE} desired=${DESIRED} running=${RUNNING} pending=${PENDING}"

            if [[ "$DEPLOYMENTS" == "1" && "$ROLLOUT_STATE" == "COMPLETED" && "$DESIRED" == "$RUNNING" && "$PENDING" == "0" ]]; then
              echo "Deployment complete!"
              exit 0
            fi

            attempt=$((attempt + 1))
            sleep 30
          done

          echo "::error::ECS service did not stabilize within 30 minutes"
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].{deployments:deployments[*].{status:status,rolloutState:rolloutState,desired:desiredCount,running:runningCount,pending:pendingCount,failed:failedTasks,taskDefinition:taskDefinition},events:events[0:20].message}' \
            --output json
          exit 1
