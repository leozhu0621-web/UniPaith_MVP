name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'unipaith-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: unipaith-backend
  ECS_CLUSTER: unipaith-cluster
  ECS_SERVICE: unipaith-backend

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: unipaith
          POSTGRES_PASSWORD: unipaith
          POSTGRES_DB: unipaith
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: unipaith-backend
        run: |
          pip install -e ".[dev]"
      - name: Enable pgvector extension
        run: |
          PGPASSWORD=unipaith psql -h localhost -U unipaith -d unipaith -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run tests
        working-directory: unipaith-backend
        env:
          DATABASE_URL: postgresql+asyncpg://unipaith:unipaith@localhost:5432/unipaith
          COGNITO_BYPASS: "true"
          AI_MOCK_MODE: "true"
          S3_LOCAL_MODE: "true"
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        working-directory: unipaith-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Register new task definition with pinned digest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Resolve the SHA256 digest of the image we just pushed (NOT :latest, which
          # ECS doesn't re-resolve on --force-new-deployment).
          DIGEST=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY@$DIGEST"
          echo "Pinning to $NEW_IMAGE"

          # Pull current task def, swap image, strip read-only fields, register new revision
          aws ecs describe-task-definition --task-definition $ECS_SERVICE \
            --query 'taskDefinition' > /tmp/td.json

          python3 -c "
          import json
          td = json.load(open('/tmp/td.json'))
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy']:
              td.pop(k, None)
          td['containerDefinitions'][0]['image'] = '$NEW_IMAGE'
          json.dump(td, open('/tmp/td-new.json','w'))
          "

          NEW_TD=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $NEW_TD"
          echo "NEW_TD=$NEW_TD" >> $GITHUB_ENV

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $NEW_TD \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "Deployment complete!"
