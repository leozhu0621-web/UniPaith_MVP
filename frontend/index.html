<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Europa via Adobe Fonts (Typekit kit spe3ioy). One font — Europa only.
         Family name is lowercase 'europa'. Ships 300/400/700. See Spec/01-brand-tokens.md §3. -->
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/spe3ioy.css" />

    <!-- Favicon + app icon — UP monogram (Spec/01-brand-tokens.md §7.3). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#FCFAF2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A1428" media="(prefers-color-scheme: dark)" />

    <title>UniPaith</title>
    <meta name="description" content="UniPaith — your path, simplified. Find programs, build a portable profile, and apply once, go anywhere." />

    <!-- Open Graph / social -->
    <meta property="og:title" content="UniPaith" />
    <meta property="og:description" content="Everyone's private college counselor. Your path, simplified." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- No-FOUC theme + accessibility init (Spec 21 §2.3). Applies the saved
         theme/font-size/dyslexia/reduced-motion before first paint so there is
         no light→dark flash. Kept in sync by src/stores/theme-store.ts. -->
    <script>
      (function () {
        try {
          var root = document.documentElement
          var t = localStorage.getItem('unipaith_theme') || 'system'
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) root.classList.add('dark')
          root.setAttribute('data-font-size', localStorage.getItem('unipaith_font_size') || 'md')
          if (localStorage.getItem('unipaith_dyslexia') === '1')
            root.setAttribute('data-dyslexia', '')
          if (localStorage.getItem('unipaith_reduce_motion') === '1')
            root.setAttribute('data-reduce-motion', '')
        } catch (e) {}
      })()
    </script>
  </head>
  <body class="font-body antialiased bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
