repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # Bumped from v0.4.8 → v0.15.12 (May 2026) so local pre-commit and
  # CI agree on isort rules. v0.4.8 removed the blank line between
  # third-party and first-party imports; v0.15.x keeps it. The mismatch
  # caused commits to oscillate.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^unipaith-backend/
      - id: ruff-format
        files: ^unipaith-backend/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock\.json|\.env\.example
